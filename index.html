<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺️ めいろのせかい</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    min-height: 100vh;
    background: #f0f7ff;
    overflow-x: hidden;
  }

  /* 空のグラデーション背景 */
  .sky {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #bde0ff 0%, #e8f4ff 50%, #fff9f0 100%);
    z-index: 0;
  }

  /* 雲 */
  .clouds {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.8;
    animation: floatCloud linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  @keyframes floatCloud {
    from { transform: translateX(-300px); }
    to { transform: translateX(110vw); }
  }

  /* メインコンテンツ */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    min-height: 100vh;
  }

  /* タイトル */
  .title-area {
    text-align: center;
    margin-bottom: 10px;
    animation: fadeDown 0.6s ease both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .title-emoji {
    font-size: 52px;
    display: block;
    margin-bottom: 8px;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  h1 {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: clamp(28px, 8vw, 48px);
    color: #2c4a6e;
    text-shadow: 3px 4px 0 rgba(44,74,110,0.15);
    letter-spacing: 0.05em;
  }

  .subtitle {
    margin-top: 8px;
    font-size: 14px;
    color: #6a8faf;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  /* カードグリッド */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 420px;
    margin-top: 32px;
  }

  /* 各カード */
  .card {
    text-decoration: none;
    display: block;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 6px 0 rgba(0,0,0,0.12), 0 12px 30px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.5s ease both;
    position: relative;
  }
  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 10px 0 rgba(0,0,0,0.12), 0 18px 40px rgba(0,0,0,0.12);
  }
  .card:active {
    transform: translateY(2px) scale(0.99);
    box-shadow: 0 3px 0 rgba(0,0,0,0.12);
  }

  .card-inner {
    display: flex;
    align-items: center;
    padding: 20px 22px;
    gap: 18px;
    position: relative;
    overflow: hidden;
  }

  /* 森カード */
  .card-mori .card-inner {
    background: linear-gradient(135deg, #2d6a2d 0%, #4a9e4a 50%, #6bc96b 100%);
  }
  .card-mori .card-border {
    box-shadow: 0 6px 0 #1a4a1a, 0 12px 30px rgba(0,0,0,0.1);
  }

  /* 街カード */
  .card-machi .card-inner {
    background: linear-gradient(135deg, #c45c00 0%, #f97316 50%, #fbbf24 100%);
  }
  .card-machi {
    box-shadow: 0 6px 0 #8b3e00, 0 12px 30px rgba(0,0,0,0.1);
  }

  /* 海カード */
  .card-umi .card-inner {
    background: linear-gradient(135deg, #0a3d6b 0%, #1a6fa8 50%, #4db8e8 100%);
  }
  .card-umi {
    box-shadow: 0 6px 0 #062a4a, 0 12px 30px rgba(0,0,0,0.1);
  }

  /* カード装飾パターン */
  .card-inner::before {
    content: '';
    position: absolute;
    right: -20px;
    top: -20px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .card-inner::after {
    content: '';
    position: absolute;
    right: 30px;
    bottom: -30px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }

  /* アイコン */
  .card-icon {
    font-size: 56px;
    flex-shrink: 0;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.2));
    animation: iconFloat 3s ease-in-out infinite;
    position: relative;
    z-index: 1;
  }
  .card:nth-child(2) .card-icon { animation-delay: -1s; }
  .card:nth-child(3) .card-icon { animation-delay: -2s; }
  @keyframes iconFloat {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-5px) rotate(3deg); }
  }

  /* テキスト */
  .card-text {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .card-title {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 22px;
    color: white;
    text-shadow: 1px 2px 0 rgba(0,0,0,0.2);
    letter-spacing: 0.04em;
  }

  .card-desc {
    margin-top: 4px;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .card-levels {
    margin-top: 8px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .level-tag {
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 700;
    color: white;
    backdrop-filter: blur(4px);
  }

  /* 矢印 */
  .card-arrow {
    font-size: 22px;
    color: rgba(255,255,255,0.7);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    transition: transform 0.2s;
  }
  .card:hover .card-arrow {
    transform: translateX(4px);
  }

  /* フッター */
  .footer {
    margin-top: 40px;
    font-size: 12px;
    color: #8aabb0;
    font-weight: 700;
    letter-spacing: 0.06em;
    animation: fadeUp 0.5s 0.5s ease both;
  }

  /* 地面の草 */
  .ground {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50px;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .grass {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30px;
    background: #7ec87e;
    border-radius: 50% 50% 0 0 / 20px 20px 0 0;
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="clouds" id="clouds"></div>
<div class="ground"><div class="grass"></div></div>

<div class="content">
  <div class="title-area">
    <span class="title-emoji">🗺️</span>
    <h1>めいろのせかい</h1>
    <p class="subtitle">すきなめいろをえらんでね！</p>
  </div>

  <div class="cards">

    <!-- 森の迷路 -->
    <a class="card card-mori" href="forest-maze.html">
      <div class="card-inner">
        <div class="card-icon">🐰</div>
        <div class="card-text">
          <div class="card-title">森の迷路</div>
          <div class="card-desc">もりのなかをたんけんしよう！</div>
          <div class="card-levels">
            <span class="level-tag">かんたん</span>
            <span class="level-tag">ふつう</span>
            <span class="level-tag">むずかしい</span>
          </div>
        </div>
        <div class="card-arrow">▶</div>
      </div>
    </a>

    <!-- 街の迷路 -->
    <a class="card card-machi" href="city-maze.html">
      <div class="card-inner">
        <div class="card-icon">🚶</div>
        <div class="card-text">
          <div class="card-title">街の迷路</div>
          <div class="card-desc">まちをさんぽしてゴールへ！</div>
          <div class="card-levels">
            <span class="level-tag">かんたん</span>
            <span class="level-tag">ふつう</span>
            <span class="level-tag">むずかしい</span>
          </div>
        </div>
        <div class="card-arrow">▶</div>
      </div>
    </a>

    <!-- 海の迷路 -->
    <a class="card card-umi" href="ocean-maze.html">
      <div class="card-inner">
        <div class="card-icon">🐠</div>
        <div class="card-text">
          <div class="card-title">海の迷路</div>
          <div class="card-desc">しんかいをおよいでゴールへ！</div>
          <div class="card-levels">
            <span class="level-tag">かんたん</span>
            <span class="level-tag">ふつう</span>
            <span class="level-tag">むずかしい</span>
          </div>
        </div>
        <div class="card-arrow">▶</div>
      </div>
    </a>

  </div>

  <p class="footer">✨ もっとめいろがふえるよ！</p>
</div>

<script>
// 雲を生成
const cloudsEl = document.getElementById('clouds');
for (let i = 0; i < 6; i++) {
  const c = document.createElement('div');
  c.className = 'cloud';
  const w = 80 + Math.random() * 120;
  const h = 24 + Math.random() * 16;
  const dur = 25 + Math.random() * 25;
  c.style.cssText = `
    width:${w}px; height:${h}px;
    top:${5 + Math.random() * 30}%;
    animation-duration:${dur}s;
    animation-delay:${-Math.random() * dur}s;
    opacity:${0.6 + Math.random() * 0.3};
  `;
  // 雲のこぶ
  c.innerHTML = `
    <div style="position:absolute;width:${h*1.4}px;height:${h*1.4}px;background:white;border-radius:50%;top:-${h*0.5}px;left:${w*0.2}px;"></div>
    <div style="position:absolute;width:${h*1.1}px;height:${h*1.1}px;background:white;border-radius:50%;top:-${h*0.3}px;left:${w*0.45}px;"></div>
  `;
  cloudsEl.appendChild(c);
}
</script>
</body>
</html>
